name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOFLAGS: -mod=readonly

jobs:
  go-quality:
    name: Go quality
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Check Go formatting
        shell: bash
        run: |
          mapfile -t files < <(git ls-files '*.go')
          unformatted="$(gofmt -l "${files[@]}")"
          if [[ -n "$unformatted" ]]; then
            echo "Go files require gofmt:"
            echo "$unformatted"
            exit 1
          fi
      - name: Check module tidiness
        run: go mod tidy -diff
      - name: Vet
        run: go vet ./...
      - name: Staticcheck
        run: go tool staticcheck ./...
      - name: Check whitespace
        shell: bash
        env:
          SHUNTER_WHITESPACE_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          bash scripts/check-whitespace-test.sh
          bash scripts/check-whitespace.sh "$SHUNTER_WHITESPACE_BASE" HEAD

  go-test:
    name: Go tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Test all packages without cached results
        run: go test -count=1 ./...
      - name: Compile tests for 32-bit targets
        env:
          GOARCH: "386"
        run: go test -run '^$' ./...
      - name: Race-test concurrency-heavy packages
        run: go test -race -count=1 . ./auth ./executor ./protocol ./protocolclient ./subscription
      - name: Race-test store and commit-log concurrent invariants
        run: |
          go test -race -count=1 ./store -run 'TestCommittedStateRegisterAndLookupAreRaceFree|TestCommittedStateLockedAccessDoesNotReenterRWMutexBehindPendingWriter|TestCommitWithValidationAtTxIDPublishesRowsAndHorizonAtomically|TestCommittedSnapshotConcurrentCloseRetainsLockFor(TableScan|IndexRange|IndexSeekIterator|PointReadLease)|TestCommittedSnapshotConcurrentCommitShortSoak'
          go test -race -count=1 ./commitlog -run 'TestDurabilityWorkerConcurrentCloseReturnsOneStableResult|TestDurabilityWorkerCloseWhileEnqueueBlockedReturnsControlledClosePanic|TestDurabilityWorkerCloseAfterSingleQueuedItemDoesNotSpinOnClosedDrain|TestDurabilityWorkerWaitUntilDurableLaterBatch|TestConcurrentSnapshotReturnsInProgress|TestCreateSnapshotUsesTempFileUntilRename'

  typescript-client:
    name: TypeScript client
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: typescript/client/package-lock.json
      - name: Install locked dependencies
        run: npm --prefix typescript/client ci
      - name: Typecheck and runtime tests
        run: npm --prefix typescript/client test
      - name: Build checked-in package artifacts
        run: npm --prefix typescript/client run build
      - name: Check generated package artifacts
        run: git diff --exit-code -- typescript/client/dist
      - name: Dry-run package and smoke test
        run: |
          npm --prefix typescript/client run pack:dry-run
          npm --prefix typescript/client run smoke:package
      - name: Audit production dependency graph
        run: npm --prefix typescript/client audit --audit-level=high

  browser-integration:
    name: Browser integration
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            typescript/client/package-lock.json
            typescript/browser-integration/package-lock.json
      - name: Install locked dependencies
        run: |
          npm --prefix typescript/client ci
          npm --prefix typescript/browser-integration ci
      - name: Install Chromium
        working-directory: typescript/browser-integration
        run: npx playwright install --with-deps chromium
      - name: Run browser integration scenarios
        run: npm --prefix typescript/browser-integration test
      - name: Audit browser dependency graph
        run: npm --prefix typescript/browser-integration audit --audit-level=high

  security:
    name: Vulnerability checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Install pinned govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: Scan reachable Go vulnerabilities
        run: govulncheck ./...

  hosted-static:
    name: Hosted and static binary gates
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: examples/hosted-chat/frontend/package-lock.json
      - name: Install CI RTK compatibility shim
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          install -m 0755 scripts/ci-rtk-shim.sh "$RUNNER_TEMP/bin/rtk"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Run static hosted-binary and hosted-chat gates
        run: bash scripts/static-hosted-binary-gate.sh
      - name: Check hosted generated artifacts
        run: git diff --exit-code -- examples/hosted-chat/shunter.contract.json examples/hosted-chat/frontend/src/generated/hosted_chat.ts
      - name: Audit hosted frontend dependency graph
        run: npm --prefix examples/hosted-chat/frontend audit --audit-level=high

  extended-race:
    name: Full race suite (scheduled/manual)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Race-test every package without cached results
        run: go test -race -count=1 ./...
